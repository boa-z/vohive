name: docker-build

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: build platforms
        required: false
        default: linux/amd64,linux/arm64
      push:
        description: push image
        required: false
        default: "false"
      enable_upx:
        description: enable UPX compression (true/false)
        required: false
        default: "true"

jobs:
  validate:
    name: Validate manual container gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Run manual container gates
        run: ./scripts/ci.sh workflow-lint hygiene release-hygiene container-hygiene tidy test

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: ${{ contains(inputs.platforms, 'arm') || contains(inputs.platforms, 'ppc') || contains(inputs.platforms, 's390') || contains(inputs.platforms, 'riscv') }}
        with:
          platforms: all

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: ${{ inputs.push == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build args
        id: vars
        shell: bash
        run: |
          VERSION="dev-${GITHUB_SHA::7}"
          BUILDTIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"
          ENABLE_UPX_RAW="${{ inputs.enable_upx }}"
          case "${ENABLE_UPX_RAW}" in
            false|0|no|off) ENABLE_UPX=0 ;;
            *) ENABLE_UPX=1 ;;
          esac
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "buildtime=${BUILDTIME}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "enable_upx=${ENABLE_UPX}" >> "${GITHUB_OUTPUT}"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.github
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push == 'true' }}
          tags: ghcr.io/${{ github.repository }}:dev
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            BUILDTIME=${{ steps.vars.outputs.buildtime }}
            REVISION=${{ steps.vars.outputs.revision }}
            ENABLE_UPX=${{ steps.vars.outputs.enable_upx }}
